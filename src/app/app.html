<nav class="site-nav" aria-label="Page sections">
  <a href="#" class="site-nav__brand text-mono" aria-label="Back to top">MV</a>
  <div class="site-nav__links">
    <a href="#mission-control">Status</a>
    <a href="#active-deployments">Deployments</a>
    <a href="#tech-stack">Stack</a>
  </div>
</nav>

<main>
  <app-hero />

  @defer (on idle) {
    <app-mission-control />
  } @placeholder {
    <section class="mc-skeleton" id="mission-control" aria-hidden="true">
      <div class="mc-skeleton__inner">
        <div class="mc-skeleton__header">
          <span class="mc-skeleton__heading">System Status</span>
          <span class="mc-skeleton__badge"></span>
        </div>
        <div class="mc-skeleton__frame">
          <div class="mc-skeleton__frame-header">
            <span class="mc-skeleton__bar mc-skeleton__bar--label"></span>
            <span class="mc-skeleton__bar mc-skeleton__bar--link"></span>
          </div>
          <div class="mc-skeleton__grid">
            <div class="mc-skeleton__item">
              <span class="mc-skeleton__dot"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--name"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--status"></span>
            </div>
            <div class="mc-skeleton__item">
              <span class="mc-skeleton__dot"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--name"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--status"></span>
            </div>
            <div class="mc-skeleton__item">
              <span class="mc-skeleton__dot"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--name"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--status"></span>
            </div>
            <div class="mc-skeleton__item">
              <span class="mc-skeleton__dot"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--name"></span>
              <span class="mc-skeleton__bar mc-skeleton__bar--status"></span>
            </div>
          </div>
        </div>
      </div>
    </section>
  }

  <section id="active-deployments" class="project-matrix" aria-labelledby="projects-heading">
    <h2 id="projects-heading" class="section-label text-mono">Active Deployments</h2>
    <div class="project-grid">
      @for (project of projects; track project.id) {
        <app-project-card [project]="project" />
      }
    </div>
  </section>

  <div id="tech-stack">
    @defer (on viewport) {
      <app-tech-stack />
    } @placeholder {
      <div style="min-height: 400px"></div>
    }
  </div>
</main>

<app-footer />
