<div
  class="card"
  [class.card--open]="overlayOpen()"
  [style.--pillar-color]="'var(' + project().pillarVar + ')'"
  tabindex="0"
  role="button"
  [attr.aria-label]="project().name + ' — ' + project().pillar"
  [attr.aria-expanded]="overlayOpen()"
  (click)="toggle()"
  (keydown.enter)="toggle()"
  (keydown.space)="toggle(); $event.preventDefault()"
>
  <div class="card__front">
    <span class="card__pillar">{{ project().pillar }}</span>
    <h3 class="card__name">
      <a [href]="project().url" target="_blank" rel="noopener noreferrer">
        {{ project().name }}
      </a>
    </h3>
    <p class="card__hook">{{ project().hook }}</p>
    <span class="card__cta">View architecture ↗</span>
  </div>

  <div class="card__overlay" role="region" [attr.aria-label]="project().name + ' architecture'">
    <div class="card__pipeline">
      @for (node of project().nodes; track node.id) {
        <span class="pipeline__node">{{ node.label }}</span>
        @if (!$last) {
          <span class="pipeline__sep" aria-hidden="true">›</span>
        }
      }
    </div>

    <p class="card__rationale">{{ project().rationale }}</p>

    <a
      [href]="project().url"
      target="_blank"
      rel="noopener noreferrer"
      class="card__link"
      (click)="$event.stopPropagation()"
    >
      Visit {{ project().name }} ↗
    </a>
  </div>
</div>
